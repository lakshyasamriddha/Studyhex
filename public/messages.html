<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages — StudyReck</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img src="/logo.svg" alt="">Study<span class="dot">Reck</span></div>
      <nav class="nav-links">
        <a class="nav-link" href="/dashboard.html">Dashboard</a>
        <a class="nav-link" href="/profile.html">Profile</a>
        <a class="nav-link" href="/leaderboard.html">Leaderboard</a>
        <a class="nav-link" href="/forum.html">Forum</a>
        <a class="nav-link active" href="/messages.html">Messages<span class="badge" id="nav-unread-badge" style="display:none;"></span></a>
        <a class="nav-link" href="/notes.html">Notes</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip" id="user-chip">
          <div class="avatar">--</div>
          <span id="user-chip-name">Loading…</span>
        </div>
        <button class="btn btn-secondary btn-block" onclick="logout()">Log out</button>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <span class="eyebrow">Direct messages</span>
          <h1>Messages</h1>
        </div>
      </div>

      <div class="messages-layout">
        <div class="card conversations-pane">
          <form id="new-convo-form" class="field-row" style="margin-bottom:14px;">
            <div class="field" style="flex:1;">
              <label for="new-convo-username">Message a username</label>
              <input id="new-convo-username" type="text" placeholder="e.g. alex_92" required>
            </div>
            <button type="submit" class="btn btn-secondary" style="align-self:flex-end;">Go</button>
          </form>
          <span class="error-text" id="new-convo-error"></span>
          <div id="conversations-list"></div>
        </div>

        <div class="card thread-pane" id="thread-pane">
          <div class="empty-state">
            <div class="glyph">✉</div>
            Pick a conversation, or start a new one by username.
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/messages.js"></script>
</body>
</html>

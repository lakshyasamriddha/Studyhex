<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — StudyReck</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img src="/logo.svg" alt="">Study<span class="dot">Reck</span></div>
      <nav class="nav-links">
        <a class="nav-link" href="/dashboard.html">Dashboard</a>
        <a class="nav-link" href="/profile.html">Profile</a>
        <a class="nav-link active" href="/search.html">Search</a>
        <a class="nav-link" href="/leaderboard.html">Leaderboard</a>
        <a class="nav-link" href="/forum.html">Forum</a>
        <a class="nav-link" href="/messages.html">Messages<span class="badge" id="nav-unread-badge" style="display:none;"></span></a>
        <a class="nav-link" href="/notes.html">Notes</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip" id="user-chip">
          <div class="avatar">--</div>
          <span id="user-chip-name">Loading…</span>
        </div>
        <button class="btn btn-secondary btn-block" onclick="logout()">Log out</button>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <span class="eyebrow">Find people</span>
          <h1>Search</h1>
        </div>
      </div>

      <div class="card">
        <div class="field">
          <input id="search-input" type="text" placeholder="Search by username…" autocomplete="off">
        </div>
        <div id="search-results" style="margin-top:12px;"></div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/search.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes — StudyReck</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img src="/logo.svg" alt="">Study<span class="dot">Reck</span></div>
      <nav class="nav-links">
        <a class="nav-link" href="/dashboard.html">Dashboard</a>
        <a class="nav-link" href="/profile.html">Profile</a>
        <a class="nav-link" href="/leaderboard.html">Leaderboard</a>
        <a class="nav-link" href="/forum.html">Forum</a>
        <a class="nav-link" href="/messages.html">Messages<span class="badge" id="nav-unread-badge" style="display:none;"></span></a>
        <a class="nav-link active" href="/notes.html">Notes</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip" id="user-chip">
          <div class="avatar">--</div>
          <span id="user-chip-name">Loading…</span>
        </div>
        <button class="btn btn-secondary btn-block" onclick="logout()">Log out</button>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <span class="eyebrow">Study notes</span>
          <h1>Notes</h1>
        </div>
      </div>

      <div class="card">
        <h3 style="font-size:1rem;">New note</h3>
        <form id="note-form">
          <div class="field">
            <label for="note-title">Title (optional)</label>
            <input id="note-title" type="text" placeholder="e.g. Chapter 4 summary">
          </div>
          <div class="field">
            <label for="note-body">Note</label>
            <textarea id="note-body" required placeholder="Write your note…"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Save note</button>
          <span class="error-text" id="note-error"></span>
        </form>
      </div>

      <div class="card">
        <h3 style="font-size:1rem;">Your notes</h3>
        <div id="my-notes-list"></div>
      </div>

      <div class="card">
        <h3 style="font-size:1rem;">Shared with you</h3>
        <div id="shared-notes-list"></div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/notes.js"></script>
</body>
</html>
